{% extends "layout.html" %}

{% block title %}
  Login
{% endblock title %}

{% block main %}
  <form action="/login" method="post">
    <div class="mb-3">
        <input autocomplete="off" autofocus class="form-control mx-auto w-auto" placeholder="Username" type="text" name="username">
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" placeholder="Password" type="password" name="password">
    </div>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
{% endblock main %}
